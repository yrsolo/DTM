runtime:
  env_default: dev
  strict_env_guard_default: false
  timezone: Europe/Moscow

web:
  domain: solofarm.ru
  api_domain_test: dtm-api-test.solofarm.ru
  api_domain_prod: dtm-api.solofarm.ru

pipeline:
  readmodel_ttl_minutes: 9
  preflight_top_rows: 50
  full_sync_interval_hours: 24
  force_refresh_default: false

snapshot_engine:
  enabled: true
  storage: s3
  bucket: dtm
  prefix_raw: snapshots/{env}/raw/default.json
  prefix_prep: snapshots/{env}/prep/default.json
  prefix_extra: snapshots/{env}/extra/
  prefix_people: snapshots/{env}/people/default.json
  force_refresh_default: false

queue:
  enabled: true
  provider: yandex_message_queue
  endpoint_url: https://message-queue.api.cloud.yandex.net
  test_queue_url: https://message-queue.api.cloud.yandex.net/b1g6d49mf4scmtn4kjki/dj60000000h3q8v503h2/dtm-test-commands
  prod_queue_url: https://message-queue.api.cloud.yandex.net/b1g6d49mf4scmtn4kjki/dj60000000h3q8vp03h2/dtm-prod-commands
  status_prefix: jobs/{env}/status/
  latest_prefix: jobs/{env}/latest/

telegram:
  webhook_path: /telegram
  allowed_updates:
    - message
    - callback_query
  max_connections: 5
  secret_required: true

notify:
  enhance_concurrency: 4
  send_retry_attempts: 3
  send_retry_backoff_seconds: 0.5
  send_retry_backoff_multiplier: 2.0
  test_chat_id_override: ""
  llm_mode_default: provider

sources:
  store_mode_default: legacy
  readmodel_source_default: legacy

timing:
  year_mode_default: legacy
  allowed_year_modes:
    - legacy
    - anchors
    - chain

api:
  debug_http_event_default: false

triggers:
  a1sldapc8v2pha7dichv: timer
  a1smsif4rc82qbj1e3hf: morning

migration:
  enable_new_sync_path: false
  enable_new_render_path: false
  enable_source_hash_gate: false
  dual_write_store: false
  hash_gate_state_file: artifacts/tmp/source_hash_gate_state.json
  store_file: artifacts/tmp/normalized_store.json
