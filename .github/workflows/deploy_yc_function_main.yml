name: Deploy Yandex Cloud Function (test contour)

on:
  push:
    branches:
      - test
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to deploy to test contour"
        required: false
        default: "test"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_ref || github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.actions.txt

      - name: Load deploy defaults from YAML
        id: deploy_defaults
        shell: bash
        run: |
          set -euo pipefail
          python agent/export_deploy_defaults.py \
            --config config/deploy.yaml \
            --target test \
            --github-env "${GITHUB_ENV}" \
            --github-output "${GITHUB_OUTPUT}" \
            --strict

      - name: Contract regression smoke checks
        run: |
          python agent/read_model_contract_compat_smoke.py
          python agent/schema_snapshot_smoke.py

      - name: Legacy import guard checks
        run: |
          python scripts/check_no_monsters.py
          python scripts/check_no_legacy_entrypoint_imports.py
          python scripts/check_no_legacy_imports.py

      - name: Preflight required variables
        shell: bash
        env:
          YC_LOCKBOX_SECRET_ID: ${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}
          YC_SERVICE_ACCOUNT_ID: ${{ vars.YC_SERVICE_ACCOUNT_ID || secrets.YC_SERVICE_ACCOUNT_ID || env.YC_SERVICE_ACCOUNT_ID }}
          YC_RUNTIME_SERVICE_ACCOUNT_ID: ${{ vars.YC_RUNTIME_SERVICE_ACCOUNT_ID || secrets.YC_RUNTIME_SERVICE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${YC_LOCKBOX_SECRET_ID}" ]; then
            echo "Missing required repository variable: YC_LOCKBOX_SECRET_ID" >&2
            exit 1
          fi
          if [ -z "${YC_SERVICE_ACCOUNT_ID}" ] && [ -z "${YC_RUNTIME_SERVICE_ACCOUNT_ID}" ]; then
            echo "Missing runtime service account variable: set YC_RUNTIME_SERVICE_ACCOUNT_ID or YC_SERVICE_ACCOUNT_ID" >&2
            exit 1
          fi

      - name: Show resolved function settings
        shell: bash
        run: |
          echo "Resolved function=${{ steps.deploy_defaults.outputs.yc_cloud_function_name }}"
          echo "Resolved runtime=${{ steps.deploy_defaults.outputs.yc_function_runtime }}"
          echo "Resolved timeout=${{ steps.deploy_defaults.outputs.yc_function_timeout }}"
          echo "Resolved memory=${{ steps.deploy_defaults.outputs.yc_function_memory }}"
          echo "Resolved entrypoint=${{ steps.deploy_defaults.outputs.yc_function_entrypoint }}"

      - name: Validate resolved deploy settings
        shell: bash
        env:
          OUT_FUNCTION_NAME: ${{ steps.deploy_defaults.outputs.yc_cloud_function_name }}
          OUT_RUNTIME: ${{ steps.deploy_defaults.outputs.yc_function_runtime }}
          OUT_TIMEOUT: ${{ steps.deploy_defaults.outputs.yc_function_timeout }}
          OUT_MEMORY: ${{ steps.deploy_defaults.outputs.yc_function_memory }}
          OUT_ENTRYPOINT: ${{ steps.deploy_defaults.outputs.yc_function_entrypoint }}
        run: |
          set -euo pipefail
          for key in OUT_FUNCTION_NAME OUT_RUNTIME OUT_TIMEOUT OUT_MEMORY OUT_ENTRYPOINT; do
            val="${!key:-}"
            if [ -z "${val}" ]; then
              echo "Missing required deploy setting: ${key}" >&2
              exit 1
            fi
          done
          echo "Deploy settings: function=${OUT_FUNCTION_NAME} runtime=${OUT_RUNTIME} timeout=${OUT_TIMEOUT} memory=${OUT_MEMORY} entrypoint=${OUT_ENTRYPOINT}"

      - name: Deploy function version
        id: deploy
        uses: yc-actions/yc-sls-function@v4
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          folder-id: ${{ steps.deploy_defaults.outputs.yc_folder_id }}
          function-name: ${{ steps.deploy_defaults.outputs.yc_cloud_function_name }}
          runtime: ${{ steps.deploy_defaults.outputs.yc_function_runtime }}
          memory: ${{ steps.deploy_defaults.outputs.yc_function_memory }}
          execution-timeout: ${{ steps.deploy_defaults.outputs.yc_function_timeout }}
          entrypoint: ${{ steps.deploy_defaults.outputs.yc_function_entrypoint }}
          service-account: ${{ vars.YC_RUNTIME_SERVICE_ACCOUNT_ID || secrets.YC_RUNTIME_SERVICE_ACCOUNT_ID || vars.YC_SERVICE_ACCOUNT_ID || secrets.YC_SERVICE_ACCOUNT_ID || env.YC_SERVICE_ACCOUNT_ID }}
          environment: |
            ENV=${{ vars.ENV || 'test' }}
            MONITORING_ENABLED=false
            MONITORING_BACKEND=yandex_monitoring
            PROMETHEUS_ENABLED=false
            MONITORING_DASHBOARD_NAME=DTM Test Observability
          secrets: |
            TG_TOKEN=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/TG_TOKEN
            OPENAI_TOKEN=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/OPENAI_TOKEN
            ORG_TOKEN=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/ORG_TOKEN
            PROXY_URL=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/PROXY_URL
            BROWSER_AUTH_PROXY_SECRET=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/BROWSER_AUTH_PROXY_SECRET
            GOOGLE_KEY_JSON=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/GOOGLE_KEY_JSON
            DEFAULT_CHAT_ID=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/DEFAULT_CHAT_ID
            AWS_ACCESS_KEY_ID=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/AWS_SECRET_ACCESS_KEY
            YANDEX_PROMETHEUS_API_KEY=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/YANDEX_PROMETHEUS_API_KEY
          include: |
            **/*.py
            src/**/*.html
            src/**/*.css
            src/**/*.js
            config/**/*.yaml
            requirements.txt
            run_timer.cmd
            AGENTS.md
            README.md
            docs/**/*.md
            work/**/*.md
          exclude: |
            .env
            .env.*
            .venv/**
            venv/**
            artifacts/**
            old/**
            .git/**
            .github/**
            **/__pycache__/**
            **/*.ipynb

      - name: Deployment summary
        if: always()
        run: |
          echo "Function deploy action finished."
          echo "Function: ${{ steps.deploy_defaults.outputs.yc_cloud_function_name }}"
          echo "Entrypoint: ${{ steps.deploy_defaults.outputs.yc_function_entrypoint }}"

