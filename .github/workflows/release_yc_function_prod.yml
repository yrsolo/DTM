name: Release Yandex Cloud Function (prod manual)

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to release (branch or tag)"
        required: false
        default: "main"
      function_target:
        description: "Prod function name/id override (optional)"
        required: false
        default: ""
      dry_run_release:
        description: "Run deploy as dry-run contour in prod function"
        required: false
        default: "false"

permissions:
  id-token: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Resolve function target
        id: target
        shell: bash
        env:
          YC_CLOUD_FUNCTION_PROD_NAME: ${{ vars.YC_CLOUD_FUNCTION_PROD_NAME || secrets.YC_CLOUD_FUNCTION_PROD_NAME }}
          YC_CLOUD_FUNCTION_PROD_ID: ${{ vars.YC_CLOUD_FUNCTION_PROD_ID || secrets.YC_CLOUD_FUNCTION_PROD_ID }}
          DEFAULT_PROD_FUNCTION_TARGET: dtm-prod
          INPUT_FUNCTION_TARGET: ${{ inputs.function_target }}
        run: |
          set -euo pipefail
          target="${INPUT_FUNCTION_TARGET:-${YC_CLOUD_FUNCTION_PROD_NAME:-${YC_CLOUD_FUNCTION_PROD_ID:-${DEFAULT_PROD_FUNCTION_TARGET}}}}"
          if [ -z "${target}" ]; then
            echo "Unable to resolve prod function target." >&2
            exit 1
          fi
          echo "target=${target}" >> "${GITHUB_OUTPUT}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.actions.txt

      - name: Contract regression smoke checks
        run: |
          python agent/read_model_contract_compat_smoke.py
          python agent/schema_snapshot_smoke.py

      - name: Preflight required variables
        shell: bash
        env:
          YC_LOCKBOX_SECRET_ID: ${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}
          YC_SERVICE_ACCOUNT_ID: ${{ vars.YC_SERVICE_ACCOUNT_ID || secrets.YC_SERVICE_ACCOUNT_ID }}
          YC_RUNTIME_SERVICE_ACCOUNT_ID: ${{ vars.YC_RUNTIME_SERVICE_ACCOUNT_ID || secrets.YC_RUNTIME_SERVICE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${YC_LOCKBOX_SECRET_ID}" ]; then
            echo "Missing required repository variable: YC_LOCKBOX_SECRET_ID" >&2
            exit 1
          fi
          if [ -z "${YC_SERVICE_ACCOUNT_ID}" ] && [ -z "${YC_RUNTIME_SERVICE_ACCOUNT_ID}" ]; then
            echo "Missing runtime service account variable: set YC_RUNTIME_SERVICE_ACCOUNT_ID or YC_SERVICE_ACCOUNT_ID" >&2
            exit 1
          fi

      - name: Deploy PROD function version
        id: deploy
        uses: yc-actions/yc-sls-function@v4
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          folder-id: ${{ vars.YC_FOLDER_ID || secrets.YC_FOLDER_ID }}
          function-name: ${{ steps.target.outputs.target }}
          runtime: ${{ vars.YC_FUNCTION_RUNTIME || 'python311' }}
          memory: ${{ vars.YC_FUNCTION_MEMORY || '512Mb' }}
          execution-timeout: ${{ vars.YC_FUNCTION_TIMEOUT || '60s' }}
          entrypoint: ${{ vars.YC_FUNCTION_ENTRYPOINT || secrets.YC_FUNCTION_ENTRYPOINT || 'index.handler' }}
          service-account: ${{ vars.YC_RUNTIME_SERVICE_ACCOUNT_ID || secrets.YC_RUNTIME_SERVICE_ACCOUNT_ID || vars.YC_SERVICE_ACCOUNT_ID || secrets.YC_SERVICE_ACCOUNT_ID }}
          environment: |
            ENV=prod
            STRICT_ENV_GUARD=0
            RELEASE_DRY_RUN=${{ inputs.dry_run_release }}
          secrets: |
            TG_TOKEN=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/TG_TOKEN
            OPENAI_TOKEN=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/OPENAI_TOKEN
            ORG_TOKEN=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/ORG_TOKEN
            PROXY_URL=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/PROXY_URL
            GOOGLE_KEY_JSON=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/GOOGLE_KEY_JSON
            DEFAULT_CHAT_ID=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/DEFAULT_CHAT_ID
            SOURCE_SHEET_NAME=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/SOURCE_SHEET_NAME
            TARGET_SHEET_NAME=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/TARGET_SHEET_NAME_PROD
            TARGET_SHEET_NAME_PROD=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/TARGET_SHEET_NAME_PROD
            WEB_DOMAIN=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/WEB_DOMAIN
            API_DOMAIN_TEST=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/API_DOMAIN_TEST
            API_DOMAIN_PROD=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/API_DOMAIN_PROD
            STORE_MODE=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/STORE_MODE
            READMODEL_SOURCE=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/READMODEL_SOURCE
            NOTIFY_SOURCE=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/NOTIFY_SOURCE
            RENDER_SOURCE=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/RENDER_SOURCE
            YDB_ID=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/YDB_ID
            YDB_ENDPOINT=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/YDB_ENDPOINT
            YDB_DATABASE=${{ vars.YC_LOCKBOX_SECRET_ID || secrets.YC_LOCKBOX_SECRET_ID }}/latest/YDB_DATABASE
          include: |
            **/*.py
            requirements.txt
            run_timer.cmd
            AGENTS.md
            README.md
            doc/**/*.md
            agile/**/*.md
          exclude: |
            .env
            .env.*
            .venv/**
            venv/**
            artifacts/**
            old/**
            .git/**
            .github/**
            **/__pycache__/**
            **/*.ipynb

      - name: Deployment summary
        if: always()
        run: |
          echo "Manual PROD release action finished."
          echo "Ref: ${{ inputs.git_ref }}"
          echo "Function target: ${{ steps.target.outputs.target }}"
