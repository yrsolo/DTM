<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">DTM main workspace screen</title>
  <desc id="desc">A product-style screenshot mock showing the DTM timeline, filters, task drawer, attachments, and analytics widgets.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fcfaf4"/>
      <stop offset="1" stop-color="#ece5d5"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f1e7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#2f6f79"/>
      <stop offset="1" stop-color="#b76035"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#263238" flood-opacity=".16"/>
    </filter>
    <style>
      .label{font:800 22px Inter,Arial,sans-serif;fill:#223039}
      .tiny{font:700 15px Inter,Arial,sans-serif;fill:#65767d}
      .small{font:700 17px Inter,Arial,sans-serif;fill:#4e6068}
      .muted{fill:#8a989d}
      .line{stroke:#d8d0bf;stroke-width:2}
      .card{fill:url(#panel);stroke:#d9d2c4;stroke-width:2;filter:url(#shadow)}
      .chip{fill:#f5fbf4;stroke:#cfddcc;stroke-width:1.5}
      .bar{rx:8}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1380" cy="115" r="220" fill="#dfeee5" opacity=".55"/>
  <circle cx="210" cy="800" r="260" fill="#f2d9c7" opacity=".42"/>

  <g filter="url(#shadow)">
    <rect x="92" y="72" width="1416" height="756" rx="34" fill="#16262d"/>
    <rect x="92" y="72" width="1416" height="72" rx="34" fill="#20343d"/>
    <circle cx="135" cy="108" r="9" fill="#d75f56"/>
    <circle cx="164" cy="108" r="9" fill="#e1b14d"/>
    <circle cx="193" cy="108" r="9" fill="#5cb87d"/>
    <text x="238" y="116" fill="#f7f5ee" font-family="Inter, Arial" font-size="22" font-weight="800">DTM workspace</text>
    <text x="1272" y="116" fill="#b7c5c8" font-family="Inter, Arial" font-size="16" font-weight="700">Snapshot: warm · ETag · 14:25</text>
  </g>

  <rect x="128" y="174" width="268" height="616" rx="24" class="card"/>
  <text x="160" y="220" class="label">Filters</text>
  <text x="160" y="250" class="tiny">project · designer · status</text>
  <g>
    <rect x="160" y="286" width="176" height="34" rx="17" class="chip"/><text x="182" y="309" class="small">Designers</text>
    <rect x="160" y="335" width="198" height="34" rx="17" class="chip"/><text x="182" y="358" class="small">Milestones</text>
    <rect x="160" y="384" width="158" height="34" rx="17" class="chip"/><text x="182" y="407" class="small">Overdue</text>
  </g>
  <line x1="160" y1="468" x2="358" y2="468" class="line"/>
  <text x="160" y="510" class="label">Team load</text>
  <rect x="160" y="545" width="180" height="18" rx="9" fill="#dce9e2"/><rect x="160" y="545" width="128" height="18" rx="9" fill="#2f6f79"/>
  <rect x="160" y="588" width="180" height="18" rx="9" fill="#eadfd6"/><rect x="160" y="588" width="92" height="18" rx="9" fill="#b76035"/>
  <rect x="160" y="631" width="180" height="18" rx="9" fill="#e6e1d5"/><rect x="160" y="631" width="154" height="18" rx="9" fill="#778c63"/>
  <text x="160" y="707" class="tiny">masked / full access</text>
  <text x="160" y="735" class="tiny">temp links · Telegram shell</text>

  <rect x="430" y="174" width="712" height="616" rx="24" class="card"/>
  <text x="468" y="220" class="label">Operational timeline</text>
  <text x="468" y="250" class="tiny">prepared browser model from SnapshotV1</text>
  <g transform="translate(468 296)">
    <line x1="0" y1="0" x2="620" y2="0" class="line"/>
    <line x1="0" y1="92" x2="620" y2="92" class="line"/>
    <line x1="0" y1="184" x2="620" y2="184" class="line"/>
    <line x1="0" y1="276" x2="620" y2="276" class="line"/>
    <g class="muted" font-family="Inter,Arial" font-size="13" font-weight="800">
      <text x="0" y="-18">Mon</text><text x="124" y="-18">Tue</text><text x="248" y="-18">Wed</text><text x="372" y="-18">Thu</text><text x="496" y="-18">Fri</text>
    </g>
    <rect x="24" y="24" width="250" height="38" rx="12" fill="#2f6f79"/><text x="45" y="49" fill="#fff" font-size="15" font-family="Inter,Arial" font-weight="800">Landing assets</text>
    <rect x="160" y="114" width="340" height="38" rx="12" fill="#b76035"/><text x="181" y="139" fill="#fff" font-size="15" font-family="Inter,Arial" font-weight="800">Promo pages</text>
    <rect x="70" y="206" width="230" height="38" rx="12" fill="#778c63"/><text x="91" y="231" fill="#fff" font-size="15" font-family="Inter,Arial" font-weight="800">Illustrations</text>
    <rect x="354" y="244" width="210" height="38" rx="12" fill="#394b57"/><text x="375" y="269" fill="#fff" font-size="15" font-family="Inter,Arial" font-weight="800">Review</text>
  </g>
  <rect x="468" y="660" width="620" height="76" rx="18" fill="#f6f8f2" stroke="#d4decf"/>
  <text x="494" y="697" class="small">Read path:</text>
  <text x="592" y="697" class="tiny">Object Storage payload → browser API → timeline/selectors</text>

  <rect x="1176" y="174" width="296" height="616" rx="24" class="card"/>
  <text x="1210" y="220" class="label">Task drawer</text>
  <text x="1210" y="250" class="tiny">status · files · comments</text>
  <rect x="1210" y="286" width="220" height="32" rx="16" fill="#20343d"/>
  <text x="1230" y="308" fill="#fff" font-size="14" font-family="Inter,Arial" font-weight="800">In progress</text>
  <text x="1210" y="365" class="small">Current milestone</text>
  <text x="1210" y="394" class="tiny">March campaign / stage 2</text>
  <line x1="1210" y1="432" x2="1430" y2="432" class="line"/>
  <text x="1210" y="475" class="small">Attachments</text>
  <rect x="1210" y="505" width="92" height="72" rx="14" fill="#e8f0f2" stroke="#c7d8dc"/>
  <rect x="1320" y="505" width="92" height="72" rx="14" fill="#f3e4d7" stroke="#e2c6b3"/>
  <text x="1210" y="638" class="small">Notifications</text>
  <text x="1210" y="668" class="tiny">Telegram reminders</text>
  <text x="1210" y="696" class="tiny">worker status visible</text>
</svg>
